# Hexo Configuration
## Docs: https://hexo.io/docs/configuration.html
## Source: https://github.com/hexojs/hexo/

# Site
title: Charles White
subtitle: 'code. compute. create.'
description: 'Charles White personal blog - computational materials science, machine learning'
keywords: 'materials science, machine learning, VASP, MD simulation'
author: Charles White
language:
  - zh-CN
  - zh
  - en
timezone: 'Asia/Shanghai'

# Sidebar
sidebar-avatar: img/avatar.jpg

# URL
url: https://white-charles.github.io
permalink: :year/:month/:day/:title/
permalink_defaults:
pretty_urls:
  trailing_index: false
  trailing_html: false

# Directory
source_dir: source
public_dir: public
tag_dir: tags
archive_dir: archives
category_dir: categories
code_dir: downloads/code
i18n_dir: :lang
skip_render:

# Writing
new_post_name: :title.md
default_layout: post
titlecase: false
external_link:
  enable: true
  field: site
  exclude: ''
filename_case: 0
render_drafts: false
post_asset_folder: false
relative_link: false
future: true
syntax_highlighter: highlight.js
highlight:
  line_number: true
  auto_detect: false
  tab_replace: ''
  wrap: true
  hljs: false
prismjs:
  preprocess: true
  line_number: true
  tab_replace: ''

# Home page setting
index_generator:
  path: ''
  per_page: 10
  order_by: -date

# Category & Tag
default_category: uncategorized
category_map:
tag_map:

# Metadata elements
meta_generator: true

# Date / Time format
date_format: YYYY-MM-DD
time_format: HH:mm:ss
updated_option: 'mtime'

# Pagination
per_page: 10
pagination_dir: page

# Include / Exclude file(s)
include:
exclude:
ignore:

# Extensions
theme: aircloud
# search
search:
  path: search.json
  field: all

# Deployment
deploy:
  type: git
  repo: git@github.com:White-Charles/White-Charles.github.io.git
  branch: gh-pages
  message: 'Site updated: {{ now("YYYY-MM-DD HH:mm:ss") }} [ci skip]'
